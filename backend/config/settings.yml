server:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["http://localhost:3000"]

database:
  path: "data/job_matcher.db"

uploads:
  dir: "data/uploads"
  max_size_mb: 10
  allowed_types:
    - "application/pdf"
    - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"

llm:
  base_url: "${LLM_BASE_URL:-https://api.deepseek.com}"
  api_key: "${LLM_API_KEY}"
  model: "deepseek-chat"                                         # 解析类任务用的模型
  model_report: "deepseek-reasoner"                                  # 报告/对话用的模型
  max_tokens_report: 4096
  max_tokens_chat: 2048
  temperature: 0.7

crawl:
  browser_headless: true
  page_load_timeout: 30000
  max_scroll_attempts: 20
  concurrent_companies: 2
